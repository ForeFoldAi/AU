# Builds AttendanceReport.exe on Windows (you cannot produce a Windows .exe on macOS).
# Run: Actions → "Build Windows EXE" → Run workflow, then download the artifact.
name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "run_gui.py"
      - "attendance_report.py"
      - "src/**"
      - "requirements.txt"
      - "build_nuitka.bat"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  nuitka-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka[onefile]>=2.4"

      - name: Build with Nuitka
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path run_gui.build) { Remove-Item -Recurse -Force run_gui.build }
          if (Test-Path run_gui.dist) { Remove-Item -Recurse -Force run_gui.dist }
          if (Test-Path run_gui.onefile-build) { Remove-Item -Recurse -Force run_gui.onefile-build }
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --windows-console-mode=disable `
            --enable-plugin=pyside6 `
            --include-qt-plugins=platforms `
            --include-module=attendance_report `
            --windows-company-name="AUINFOCITY" `
            --windows-product-name="Attendance Report" `
            --windows-file-version=1.0.0.0 `
            --windows-product-version=1.0.0.0 `
            --output-dir=build `
            --output-filename=AttendanceReport.exe `
            run_gui.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AttendanceReport-Windows
          path: build/AttendanceReport.exe
