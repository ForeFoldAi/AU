# Builds AttendanceReport.exe on Windows.
# Supports:
# 1) Artifact build (internal download from Actions run)
# 2) Optional GitHub Release publish for direct user download
name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create GitHub Release with downloadable EXE"
        required: true
        default: false
        type: boolean
      version:
        description: "Release version (used only when publish_release=true), e.g. v1.0.1"
        required: false
        default: ""
  push:
    branches: [main, master]
    paths:
      - "run_gui.py"
      - "attendance_report.py"
      - "src/**"
      - "requirements.txt"
      - "build_nuitka.bat"
      - ".github/workflows/build-windows-exe.yml"

permissions:
  contents: write

jobs:
  nuitka-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka>=2.4"

      - name: Build with Nuitka
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path run_gui.build) { Remove-Item -Recurse -Force run_gui.build }
          if (Test-Path run_gui.dist) { Remove-Item -Recurse -Force run_gui.dist }
          if (Test-Path run_gui.onefile-build) { Remove-Item -Recurse -Force run_gui.onefile-build }
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --windows-console-mode=disable `
            --enable-plugin=pyside6 `
            --include-qt-plugins=platforms,styles,imageformats `
            --include-module=attendance_report `
            --windows-company-name="AUINFOCITY" `
            --windows-product-name="Attendance Report" `
            --windows-file-version=1.0.0.0 `
            --windows-product-version=1.0.0.0 `
            --output-dir=build `
            --output-filename=AttendanceReport.exe `
            run_gui.py

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "build/AttendanceReport.dist/*" -DestinationPath "build/AttendanceReport-win64-portable.zip" -Force

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AttendanceReport-Windows-Portable
          path: build/AttendanceReport-win64-portable.zip

      - name: Prepare release assets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "v1.0.${{ github.run_number }}"
          }
          "RELEASE_TAG=$version" >> $env:GITHUB_ENV
          Copy-Item "build/AttendanceReport-win64-portable.zip" "build/AttendanceReport-$version-win64-portable.zip"

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Attendance Report ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            build/AttendanceReport-${{ env.RELEASE_TAG }}-win64-portable.zip
