# Builds AttendanceReport.exe on Windows.
# Supports:
# 1) Artifact build (internal download from Actions run)
# 2) Optional GitHub Release publish for direct user download
name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create GitHub Release with downloadable EXE"
        required: true
        default: false
        type: boolean
      version:
        description: "Release version (used only when publish_release=true), e.g. v1.0.1"
        required: false
        default: ""
  push:
    branches: [main, master]
    paths:
      - "run_gui.py"
      - "attendance_report.py"
      - "src/**"
      - "requirements.txt"
      - "build_nuitka.bat"
      - "installer.iss"
      - ".github/workflows/build-windows-exe.yml"

permissions:
  contents: write

jobs:
  nuitka-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka>=2.4"

      - name: Build with Nuitka
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path run_gui.build) { Remove-Item -Recurse -Force run_gui.build }
          if (Test-Path run_gui.dist) { Remove-Item -Recurse -Force run_gui.dist }
          if (Test-Path run_gui.onefile-build) { Remove-Item -Recurse -Force run_gui.onefile-build }
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --windows-console-mode=disable `
            --enable-plugin=pyside6 `
            --include-qt-plugins=platforms,styles,imageformats `
            --include-module=attendance_report `
            --include-data-files=src/public/forefold-logo.png=forefold-logo.png `
            --windows-company-name="ForeFold AI" `
            --windows-product-name="ForeFold Report Generator" `
            --windows-file-version=1.0.0.0 `
            --windows-product-version=1.0.0.0 `
            --output-dir=build `
            --output-filename=AttendanceReport.exe `
            run_gui.py

      - name: Normalize dist folder name
        shell: pwsh
        run: |
          $distDirs = Get-ChildItem -Path build -Directory -Filter "*.dist" -ErrorAction SilentlyContinue
          if (-not $distDirs -or $distDirs.Count -eq 0) {
            throw "No .dist folder found under build after Nuitka compile."
          }
          if ($distDirs.Count -gt 1) {
            Write-Host "Found multiple .dist folders:"
            $distDirs | ForEach-Object { Write-Host " - $($_.FullName)" }
            throw "Ambiguous .dist output. Please keep only one build target."
          }
          $src = $distDirs[0].FullName
          $dst = Join-Path (Resolve-Path "build").Path "AttendanceReport.dist"
          if ($src -ne $dst) {
            if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
            Move-Item -Path $src -Destination $dst
          }
          if (-not (Test-Path (Join-Path $dst "AttendanceReport.exe"))) {
            throw "AttendanceReport.exe not found in normalized dist folder: $dst"
          }

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "build/AttendanceReport.dist/*" -DestinationPath "build/AttendanceReport-win64-portable.zip" -Force

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer (permanent per-user install)
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after installing Inno Setup." }
          & $iscc installer.iss
          $setup = "build/installer/ForeFoldReportGeneratorSetup.exe"
          if (-not (Test-Path $setup)) { throw "Expected installer not found: $setup" }

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AttendanceReport-Windows-Portable
          path: build/AttendanceReport-win64-portable.zip

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ForeFoldReportGenerator-Windows-Setup
          path: build/installer/ForeFoldReportGeneratorSetup.exe

      - name: Prepare release assets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "v1.0.${{ github.run_number }}"
          }
          "RELEASE_TAG=$version" >> $env:GITHUB_ENV
          Copy-Item "build/AttendanceReport-win64-portable.zip" "build/AttendanceReport-$version-win64-portable.zip"
          Copy-Item "build/installer/ForeFoldReportGeneratorSetup.exe" "build/ForeFoldReportGenerator-$version-Setup.exe"

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ForeFold Report Generator ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            build/AttendanceReport-${{ env.RELEASE_TAG }}-win64-portable.zip
            build/ForeFoldReportGenerator-${{ env.RELEASE_TAG }}-Setup.exe
